<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // CONFIGURAÇÃO DO SEU BANCO DE DADOS (Substitua com os seus dados do Supabase)
  const SUPABASE_URL = "SUA_PROJECT_URL_AQUI";
  const SUPABASE_KEY = "SUA_ANON_PUBLIC_KEY_AQUI";
  
  // Conecta o site com o banco de dados
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let images = [];
  let lightboxIndex = 0;
  const IS_ADMIN = sessionStorage.getItem("asgard_admin_logado") === "true";

  // ── Carregar do Banco de Dados em Nuvem (Supabase) ──
  async function loadImages() {
    try {
      // Busca todas as linhas da tabela "fotos" ordenando pelas mais recentes
      const { data, error } = await supabase
        .from('fotos')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) throw error;
      
      // Se o banco estiver vazio, você pode mapear fotos estáticas locais temporariamente
      images = data || [];
    } catch (e) {
      console.error("Erro ao carregar fotos da nuvem:", e);
      images = [];
    }
    
    ajustarVisaoAdmin();
    renderGallery();
  }

  function ajustarVisaoAdmin() {
    const toolbar = document.getElementById("admin-toolbar");
    const msgPermissao = document.getElementById("msg-permissao");
    
    if (!IS_ADMIN) {
      if (toolbar) toolbar.classList.add("hidden");
      if (msgPermissao) msgPermissao.textContent = "Aguarde o administrador realizar o upload das fotos.";
    }
  }

  function renderGallery() {
    const gallery = document.getElementById('gallery');
    const empty   = document.getElementById('empty-state');
    const count   = document.getElementById('photo-count');
    const clearBtn= document.getElementById('clear-btn');

    if (!gallery) return;
    gallery.innerHTML = '';
    count.textContent = `${images.length} foto${images.length !== 1 ? 's' : ''}`;
    
    if (clearBtn) {
      clearBtn.style.display = (images.length && IS_ADMIN) ? 'inline-flex' : 'none';
    }

    if (images.length === 0) {
      if (empty) empty.classList.add('visible');
      return;
    }
    if (empty) empty.classList.remove('visible');

    images.forEach((img, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      
      const botaoRemover = IS_ADMIN ? `<button class="del-btn" onclick="deleteImage(event, ${img.id}, '${img.url}')">Remover</button>` : '';

      item.innerHTML = `
        <img src="${img.url}" alt="${img.nome}" loading="lazy">
        <div class="overlay">
          <span class="img-name">${img.nome}</span>
          ${botaoRemover}
        </div>`;
        
      item.querySelector('img').addEventListener('click', () => openLightbox(i));
      gallery.appendChild(item);
    });
  }

  // ── Adicionar fotos na Nuvem (Storage + Banco de Dados) ──
  document.getElementById('file-input').addEventListener('change', async function () {
    if (!IS_ADMIN) {
      alert("Acesso negado.");
      return;
    }

    const files = Array.from(this.files);
    if (!files.length) return;

    showToast('Enviando arquivos para a nuvem de Asgard...');

    for (const file of files) {
      // 1. Gera um nome único para o arquivo não sobrescrever outros
      const nomeArquivo = `${Date.now()}_${file.name}`;

      // 2. Faz o upload do arquivo físico para o Storage do Supabase
      const { data: storageData, error: storageError } = await supabase.storage
        .from('galeria')
        .upload(nomeArquivo, file);

      if (storageError) {
        alert("Erro no upload do arquivo: " + storageError.message);
        continue;
      }

      // 3. Pega o link público gerado para essa imagem
      const { data: publicUrlData } = supabase.storage
        .from('galeria')
        .getPublicUrl(nomeArquivo);
        
      const linkPublico = publicUrlData.publicUrl;

      // 4. Salva o link e o nome na tabela "fotos" do banco
      const { error: dbError } = await supabase
        .from('fotos')
        .insert([{ nome: file.name, url: linkPublico }]);

      if (dbError) {
        alert("Erro ao registrar foto no banco: " + dbError.message);
      }
    }

    showToast('Galeria atualizada na nuvem!');
    loadImages(); // Recarrega a galeria trazendo os dados novos da nuvem
    this.value = '';
  });

  // ── Deletar da Nuvem (Deleta o registro e o arquivo físico) ──
  async function deleteImage(e, id, urlCompleta) {
    if (!IS_ADMIN) return;
    e.stopPropagation();
    
    if (!confirm("Tem certeza que deseja deletar essa foto para sempre de todos os usuários?")) return;

    // Extrai o nome do arquivo a partir da URL para deletar do Storage também
    const nomeArquivo = urlCompleta.split('/').pop();

    showToast('Removendo da nuvem...');

    // 1. Deleta da tabela
    const { error: dbError } = await supabase.from('fotos').delete().eq('id', id);
    
    // 2. Deleta do Storage
    await supabase.storage.from('galeria').remove([nomeArquivo]);

    if (!dbError) {
      showToast('Foto removida com sucesso!');
      loadImages();
    } else {
      alert("Erro ao deletar: " + dbError.message);
    }
  }

  // ── Limpar Tudo (Apenas Admin) ──
  async function clearAll() {
    if (!IS_ADMIN || !confirm('REMOVER ABSOLUTAMENTE TODAS AS FOTOS DA NUVEM?')) return;
    
    showToast('Limpando banco de dados...');
    
    // Deleta tudo da tabela (Filtro para deletar IDs maiores que zero)
    const { error } = await supabase.from('fotos').delete().gt('id', 0);
    
    if (!error) {
      showToast('Galeria limpa. Lembre-se de limpar os arquivos do Storage manualmente se desejar.');
      loadImages();
    }
  }

  // ── Lightbox (Exibição ampliada) ──
  function openLightbox(i) {
    lightboxIndex = i;
    document.getElementById('lightbox-img').src = images[i].url;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function navigateLightbox(dir) {
    lightboxIndex = (lightboxIndex + dir + images.length) % images.length;
    document.getElementById('lightbox-img').src = images[lightboxIndex].url;
  }

  document.getElementById('lightbox').addEventListener('click', function (e) {
    if (e.target === this) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft')  navigateLightbox(-1);
    if (e.key === 'ArrowRight') navigateLightbox(1);
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    if (t) {
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  }

  loadImages();
</script>
