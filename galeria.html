<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Galeria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede6;
    --muted: #888;
    --accent: #c9a96e;
    --accent-dim: rgba(201,169,110,0.12);
    --radius: 4px;
  }

  body {
    background: var(--bg);
    color: black;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  #photo-count {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .toolbar {
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.18s;
    background: var(--surface);
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .btn:hover { border-color: rgba(255,255,255,0.22); background: #222; }

  .btn-accent {
    background: var(--accent);
    color: #0e0e0e;
    border-color: var(--accent);
    font-weight: 500;
  }

  .btn-accent:hover { background: #d4b07c; border-color: #d4b07c; }

  .btn-danger { color: #e06c6c; }
  .btn-danger:hover { border-color: #e06c6c; background: rgba(224,108,108,0.08); }

  #file-input { display: none; }

  .gallery {
    padding: 2rem;
    columns: 4 220px;
    gap: 10px;
  }

  .gallery-item {
    break-inside: avoid;
    margin-bottom: 10px;
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .gallery-item img {
    width: 100%;
    display: block;
    transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
  }

  .gallery-item:hover img { transform: scale(1.04); }

  .gallery-item .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.2s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 12px;
  }

  .gallery-item:hover .overlay { opacity: 1; }

  .overlay .img-name {
    font-size: 11px;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
  }

  .overlay .del-btn {
    align-self: flex-end;
    background: rgba(224,108,108,0.85);
    border: none;
    border-radius: 3px;
    color: #fff;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .overlay .del-btn:hover { background: #c85454; }

  .empty-state {
    padding: 5rem 2rem;
    text-align: center;
    display: none;
  }

  .empty-state.visible { display: block; }

  .empty-state svg {
    width: 56px;
    height: 56px;
    stroke: var(--muted);
    margin-bottom: 1.25rem;
  }

  .empty-state p {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    margin-bottom: 1.5rem;
  }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 90vw;
    max-height: 88vh;
    object-fit: contain;
    border-radius: var(--radius);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }

  #lightbox-close {
    position: fixed;
    top: 1.25rem;
    right: 1.5rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 22px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s;
  }

  #lightbox-close:hover { border-color: rgba(255,255,255,0.35); }

  #lightbox-prev, #lightbox-next {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s;
  }

  #lightbox-prev { left: 1.25rem; }
  #lightbox-next { right: 1.25rem; }
  #lightbox-prev:hover, #lightbox-next:hover { border-color: rgba(255,255,255,0.35); }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: var(--radius);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 2000;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 600px) {
    header { padding: 2rem 1rem 1.25rem; }
    .toolbar { padding: 1rem; flex-wrap: wrap; }
    .gallery { padding: 1rem; columns: 2 140px; }
  }
</style>
</head>
<body>

<header>
  <h1>Minha <span>Galeria</span></h1>
  <span id="photo-count">0 fotos</span>
</header>

<div class="toolbar">
  <button class="btn btn-accent" onclick="document.getElementById('file-input').click()">
    ＋ Adicionar fotos
  </button>
  <button class="btn btn-danger" onclick="clearAll()" id="clear-btn" style="display:none">
    Limpar tudo
  </button>
  <input type="file" id="file-input" accept="image/*" multiple>
</div>

<div class="empty-state visible" id="empty-state">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <circle cx="8.5" cy="8.5" r="1.5"/>
    <polyline points="21 15 16 10 5 21"/>
  </svg>
  <p>Nenhuma foto ainda.<br>Clique em "Adicionar fotos" para começar.</p>
</div>

<div class="gallery" id="gallery"></div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <button id="lightbox-prev" onclick="navigateLightbox(-1)">&#8592;</button>
  <img id="lightbox-img" src="" alt="">
  <button id="lightbox-next" onclick="navigateLightbox(1)">&#8594;</button>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'gallery_images_v1';
  let images = [];
  let lightboxIndex = 0;

  // ── Carregar do localStorage ──
  function loadImages() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      images = raw ? JSON.parse(raw) : [];
    } catch (e) {
      images = [];
    }
    renderGallery();
  }

  function saveImages() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(images));
    } catch (e) {
      showToast('⚠ Armazenamento cheio. Remova algumas fotos.');
    }
  }

  // ── Renderizar galeria ──
  function renderGallery() {
    const gallery = document.getElementById('gallery');
    const empty   = document.getElementById('empty-state');
    const count   = document.getElementById('photo-count');
    const clearBtn= document.getElementById('clear-btn');

    gallery.innerHTML = '';
    count.textContent = `${images.length} foto${images.length !== 1 ? 's' : ''}`;
    clearBtn.style.display = images.length ? 'inline-flex' : 'none';

    if (images.length === 0) {
      empty.classList.add('visible');
      return;
    }
    empty.classList.remove('visible');

    images.forEach((img, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.innerHTML = `
        <img src="${img.data}" alt="${img.name}" loading="lazy">
        <div class="overlay">
          <span class="img-name">${img.name}</span>
          <button class="del-btn" onclick="deleteImage(event, ${i})">Remover</button>
        </div>`;
      item.querySelector('img').addEventListener('click', () => openLightbox(i));
      gallery.appendChild(item);
    });
  }

  // ── Adicionar fotos ──
  document.getElementById('file-input').addEventListener('change', function () {
    const files = Array.from(this.files);
    if (!files.length) return;

    let loaded = 0;
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        images.push({ name: file.name, data: e.target.result });
        loaded++;
        if (loaded === files.length) {
          saveImages();
          renderGallery();
          showToast(`${files.length} foto${files.length > 1 ? 's' : ''} adicionada${files.length > 1 ? 's' : ''}!`);
        }
      };
      reader.readAsDataURL(file);
    });
    this.value = '';
  });

  // ── Deletar ──
  function deleteImage(e, index) {
    e.stopPropagation();
    images.splice(index, 1);
    saveImages();
    renderGallery();
    showToast('Foto removida.');
  }

  function clearAll() {
    if (!confirm('Remover todas as fotos da galeria?')) return;
    images = [];
    saveImages();
    renderGallery();
    showToast('Galeria limpa.');
  }

  // ── Lightbox ──
  function openLightbox(i) {
    lightboxIndex = i;
    document.getElementById('lightbox-img').src = images[i].data;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function navigateLightbox(dir) {
    lightboxIndex = (lightboxIndex + dir + images.length) % images.length;
    document.getElementById('lightbox-img').src = images[lightboxIndex].data;
  }

  document.getElementById('lightbox').addEventListener('click', function (e) {
    if (e.target === this) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft')  navigateLightbox(-1);
    if (e.key === 'ArrowRight') navigateLightbox(1);
  });

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Init ──
  loadImages();
</script>
</body>
</html>
